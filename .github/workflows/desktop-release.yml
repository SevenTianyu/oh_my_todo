name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish"
        required: true
        default: "desktop-v0.1.0"
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  macos:
    name: Build macOS app
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Package macOS app
        run: npm run desktop:pack:mac

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: oh-my-todo-macos
          path: release/*.zip
          if-no-files-found: error

  windows:
    name: Build Windows app
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Package Windows portable app
        run: npm run desktop:pack:win

      - name: Upload Windows app artifact
        uses: actions/upload-artifact@v4
        with:
          name: oh-my-todo-windows
          path: release/*.exe
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs:
      - macos
      - windows
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: "oh_my_todo Desktop ${{ steps.release_tag.outputs.tag }}"
          body: |
            Desktop builds for personal local use.

            - macOS: download the `.zip`, unzip it, then open `面试工作台.app`.
            - Windows: download the portable `.exe` and run it directly.
            - Data migration still uses JSON export/import from the web or older local version.
          files: release-artifacts/**/*
